title: Rusty Typewriter
theme: rusty-typewriter
languageCode: en-US
enableRobotsTXT: true
params:
  author:
    name: Richard Davey
  rtwt:
    side:
      home:
        countTaxonomy: 3
        taxonomies:
          - tags
          - series
taxonomies:
  series: series
  tag: tags
  topic: topics
menus:
  main:
    - name: Posts
      pageRef: /posts
      weight: 1
    - name: Projects
      pageRef: /features
      weight: 2
    - name: About
      pageRef: /about.md
      weight: 3
outputFormats:
  SearchIndex:
    baseName: searchindex
    isPlainText: true
    mediaType: application/json
    notAlternative: true
mediaTypes:
  application/json:
    suffixes: json
outputs:
  home:
    - HTML
    - RSS
    - SearchIndex

markup:
  goldmark:
    renderer:
      unsafe: true

